<nav class="au-navbar">
  <a class="au-navbar__brand" routerLink="/">
    <span class="au-navbar__crest">AU</span>
    <span class="au-navbar__title">Angular University</span>
  </a>

  <div class="au-navbar__links">
    <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
      Início
    </a>
    <a routerLink="/resultados" routerLinkActive="is-active">Resultados</a>
    <a routerLink="/favoritos" routerLinkActive="is-active">
      Favoritos
      @if (favoritesService.favorites().length > 0) {
        <span class="au-navbar__badge">{{ favoritesService.favorites().length }}</span>
      }
    </a>
    <a routerLink="/sobre" routerLinkActive="is-active">Sobre</a>
  </div>

  <button
    mat-icon-button
    class="au-navbar__theme-toggle"
    [matTooltip]="themeService.theme() === 'dark' ? 'Ativar modo claro' : 'Ativar modo escuro'"
    (click)="toggleTheme()"
  >
    <mat-icon>{{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</nav>
